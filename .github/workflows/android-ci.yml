name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true"
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 36
        build-tools: 36.1.0
        ndk: 26.1.10909125
    - name: Grant execute permission for gradlew
      run: chmod +x ./android/gradlew
    - name: Run unit tests
      run: cd android && ./gradlew test --no-daemon

    - name: Run Python tests
      run: |
        pip install pytest
        cd android/app/src/main/python
        python -m pytest tests/ -v

    - name: Build with Gradle
      run: cd android && ./gradlew assembleDebug --no-daemon -x test --info 2>&1 | tail -500